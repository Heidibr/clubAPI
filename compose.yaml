services:
  app:
    build:
      context: .
    ports:
      - "8080:8080"
    environment:
      - APP_DATA_DIR=/app/data        # -> app.data.dir, relaxed binding
    volumes:
      - club-data:/app/data           # H2 file persists here
    develop:
      watch:
        - action: rebuild
          path: src
        - action: rebuild
          path: pom.xml

volumes:
  club-data:
